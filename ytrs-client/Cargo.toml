[package]
name = "ytrs-client"
version = "0.1.0"
edition = "2024"
authors = ["ytrs contributors"]
description = "GUI client for ytrs - YouTube search and playback"
license = "GPL-3.0"

[dependencies]
ytrs = { path = ".." }
iced = { git = "https://github.com/iced-rs/iced", branch = "master", features = ["tokio", "image"] }
iced_aw = { git = "https://github.com/iced-rs/iced_aw", branch = "main", default-features = false, features = ["wrap"] }
tokio = { version = "1", features = ["full"] }
reqwest = { version = "0.12", features = ["rustls-tls"], default-features = false }
image = "0.25"
bytes = "1.10"

[patch.crates-io]
iced_core = { git = "https://github.com/iced-rs/iced", branch = "master" }
iced_widget = { git = "https://github.com/iced-rs/iced", branch = "master" }
iced_renderer = { git = "https://github.com/iced-rs/iced", branch = "master" }
